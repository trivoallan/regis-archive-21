name: Build & Deploy Archive

on:
  push:
    branches: [main]
    paths:
      - static/archive/**
      - src/**
      - docs/**
      - docusaurus.config.ts
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build archive site
        env:
          # Use vars.ARCHIVE_URL if set, otherwise fallback to default GitHub Pages URL.
          ARCHIVE_URL: "${{ vars.ARCHIVE_URL || format('https://{0}.github.io', github.repository_owner) }}"
          # Use vars.ARCHIVE_BASE_URL if set, otherwise fallback to default repository path.
          ARCHIVE_BASE_URL: "${{ vars.ARCHIVE_BASE_URL || format('/{0}/', github.event.repository.name) }}"
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          keep-files: true
