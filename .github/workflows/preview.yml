name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        id: pr-preview
        with:
          source-dir: .
          preview-branch: main
          umbrella-dir: requests
          qr-code: false
          comment: false

      - name: Get report file path
        id: report-path
        uses: damoun/action-find-files@v2
        with:
          pattern: 'report.json'
          path: '.'

      - name: Create comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.pr-preview.outputs.preview-url }}/${{ steps.report-path.outputs.files[0] }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: main
          umbrella-dir: requests
          action: remove
